name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.7'
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: dart format --output=none --set-exit-if-changed .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.7'
          cache: true
      - run: flutter pub get
      - run: flutter test --coverage
      - name: Coverage threshold check
        run: |
          TOTAL=$(grep -c '^end_of_record' coverage/lcov.info)
          HIT=$(grep '^DA:' coverage/lcov.info | grep -v ',0$' | wc -l)
          if [ "$TOTAL" -eq 0 ]; then echo "No coverage data"; exit 1; fi
          PERCENT=$((HIT * 100 / TOTAL))
          echo "Line coverage: ${PERCENT}%"
          if [ "$PERCENT" -lt 18 ]; then
            echo "::error::Coverage ${PERCENT}% is below 18% threshold"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/lcov.info

  build-check:
    name: Build Check (Android)
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.7'
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug --target-platform android-arm64
